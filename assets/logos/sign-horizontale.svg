<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="width:100%; height:100%; background:#0D1B2A;">
  <!-- Fond de route -->
  <path d="M 150 500 L 350 200 L 450 200 L 650 500 Z" fill="#1B2A4A" opacity="0.5"/>
  <!-- Lignes blanches de bordure -->
  <line x1="150" y1="500" x2="350" y2="200" stroke="#FFFFFF" stroke-width="4" />
  <line x1="650" y1="500" x2="450" y2="200" stroke="#FFFFFF" stroke-width="4" />
  <!-- Lignes axiales jaunes (Marquage) -->
  <line x1="400" y1="210" x2="400" y2="250" stroke="#E8A020" stroke-width="8" stroke-dasharray="15,10" />
  <line x1="400" y1="280" x2="400" y2="350" stroke="#E8A020" stroke-width="12" stroke-dasharray="25,15" />
  <line x1="400" y1="390" x2="400" y2="490" stroke="#E8A020" stroke-width="16" />
</svg>
